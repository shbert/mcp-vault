# docker-compose.yml — MCP Vault + WAF
#
# Usage :
#   docker compose build
#   docker compose up -d
#   docker compose logs -f
#
# Architecture réseau :
#   Internet → WAF (port 8085) → mcp-vault (port 8030, réseau interne)
#   Le service MCP n'est PAS exposé directement.
#   OpenBao tourne en localhost dans le conteneur mcp-vault.

services:

  # ─────────────────────────────────────────────────────────────
  # WAF — Caddy + Coraza OWASP CRS + Rate Limiting
  # ─────────────────────────────────────────────────────────────
  waf:
    build: ./waf
    ports:
      - "${WAF_PORT:-8085}:8085"
    volumes:
      - ./waf/Caddyfile:/etc/caddy/Caddyfile:ro
    environment:
      - SITE_ADDRESS=${SITE_ADDRESS:-:8085}
      - WAF_TLS_DIRECTIVE=${WAF_TLS_DIRECTIVE:-}
    depends_on:
      - mcp-vault
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1.0
    # SÉCURITÉ P2-7 : hardening Docker
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/log/coraza:size=50m
      - /data:size=10m
      - /config:size=10m
      - /tmp:size=10m
    networks:
      - mcp-net

  # ─────────────────────────────────────────────────────────────
  # MCP Vault — Python + OpenBao embedded (réseau interne)
  # ─────────────────────────────────────────────────────────────
  mcp-vault:
    build:
      context: .
      target: production
    # PAS de "ports:" — expose uniquement sur le réseau interne
    expose:
      - "8030"
    env_file: .env
    volumes:
      # Persistance locale du file backend OpenBao (cache crash recovery)
      - openbao-data:/openbao/file
      # Logs OpenBao (optionnel)
      - openbao-logs:/openbao/logs
    cap_add:
      - IPC_LOCK  # Permet à OpenBao de verrouiller la mémoire (mlock)
    restart: unless-stopped
    mem_limit: 2g
    cpus: 2.0
    # SÉCURITÉ P2-7 : hardening Docker
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=50m
    networks:
      - mcp-net

  # ─────────────────────────────────────────────────────────────
  # Tests — Lance les tests d'intégration (usage ponctuel)
  # docker compose run --rm test
  # ─────────────────────────────────────────────────────────────
  # P2-8 : Tests dans un stage dédié (hors image prod)
  test:
    build:
      context: .
      target: test
    env_file: .env
    profiles: ["test"]
    security_opt:
      - no-new-privileges:true
    networks:
      - mcp-net

volumes:
  openbao-data:
    driver: local
  openbao-logs:
    driver: local

networks:
  mcp-net:
    driver: bridge
