# Configuration Coraza WAF pour MCP Vault
#
# Ce fichier est chargé par la directive coraza_waf dans le Caddyfile.
# Il configure le moteur de règles, charge les OWASP CRS v4, et définit
# des exceptions spécifiques à l'API MCP.
#
# Stratégie WAF :
#   - Mode BLOCKING sur TOUS les endpoints (health, /mcp, /admin/api)
#   - Exclusions ciblées pour 2 faux positifs CRS identifiés (920540, 932120)
#   - Fine-tuning complété le 2026-03-23 — 295/295 tests e2e validés
#
# Documentation : https://coraza.io/docs/seclang/directives/

# ── Moteur de règles ───────────────────────────────────────────────
SecRuleEngine On

# ── Accès au corps des requêtes/réponses ───────────────────────────
SecRequestBodyAccess On
SecResponseBodyAccess Off

# ── Limites de taille (adapté aux payloads MCP JSON) ──────────────
SecRequestBodyLimit 10485760
SecRequestBodyNoFilesLimit 5242880

# ── Logging ────────────────────────────────────────────────────────
SecAuditEngine RelevantOnly
SecAuditLogFormat JSON

# ── Méthodes HTTP autorisées (avant chargement CRS) ───────────────
# Le protocole MCP utilise DELETE pour fermer les sessions SSE.
# L'API admin utilise PUT pour mettre à jour les tokens.
SecAction "id:900200,phase:1,nolog,pass,t:none,setvar:'tx.allowed_methods=GET HEAD POST OPTIONS PUT PATCH DELETE'"

# ── Charger OWASP CoreRuleSet v4 ──────────────────────────────────
Include /opt/crs/crs-setup.conf
Include /opt/crs/rules/REQUEST-901-INITIALIZATION.conf
Include /opt/crs/rules/REQUEST-905-COMMON-EXCEPTIONS.conf
Include /opt/crs/rules/REQUEST-911-METHOD-ENFORCEMENT.conf
Include /opt/crs/rules/REQUEST-913-SCANNER-DETECTION.conf
Include /opt/crs/rules/REQUEST-920-PROTOCOL-ENFORCEMENT.conf
Include /opt/crs/rules/REQUEST-921-PROTOCOL-ATTACK.conf
Include /opt/crs/rules/REQUEST-930-APPLICATION-ATTACK-LFI.conf
Include /opt/crs/rules/REQUEST-931-APPLICATION-ATTACK-RFI.conf
Include /opt/crs/rules/REQUEST-932-APPLICATION-ATTACK-RCE.conf
Include /opt/crs/rules/REQUEST-933-APPLICATION-ATTACK-PHP.conf
Include /opt/crs/rules/REQUEST-934-APPLICATION-ATTACK-GENERIC.conf
Include /opt/crs/rules/REQUEST-941-APPLICATION-ATTACK-XSS.conf
Include /opt/crs/rules/REQUEST-942-APPLICATION-ATTACK-SQLI.conf
Include /opt/crs/rules/REQUEST-943-APPLICATION-ATTACK-SESSION-FIXATION.conf
Include /opt/crs/rules/REQUEST-944-APPLICATION-ATTACK-JAVA.conf
Include /opt/crs/rules/REQUEST-949-BLOCKING-EVALUATION.conf
Include /opt/crs/rules/RESPONSE-950-DATA-LEAKAGES.conf
Include /opt/crs/rules/RESPONSE-951-DATA-LEAKAGES-SQL.conf
Include /opt/crs/rules/RESPONSE-952-DATA-LEAKAGES-JAVA.conf
Include /opt/crs/rules/RESPONSE-953-DATA-LEAKAGES-PHP.conf
Include /opt/crs/rules/RESPONSE-954-DATA-LEAKAGES-IIS.conf
Include /opt/crs/rules/RESPONSE-959-BLOCKING-EVALUATION.conf
Include /opt/crs/rules/RESPONSE-980-CORRELATION.conf

# ── Exceptions MCP Vault ──────────────────────────────────────────
#
# Les endpoints API (/mcp, /admin/api) sont protégés par :
#   1. Bearer token obligatoire (AuthMiddleware)
#   2. Policies MCP (check_policy, check_path_policy)
#   3. Owner-based isolation (check_vault_access)
#
# Les CRS sont conçues pour les applications web HTML/formulaires et
# génèrent des faux positifs sur les payloads JSON-RPC :
#   - Unicode dans les textes français (\u00e9) → règle 920540
#   - Noms contenant "test-path" → règle 932120 (PowerShell Test-Path)
#
# → Mode BLOCKING avec exclusions ciblées (voir ci-dessous)

# ── PHASE BLOCKING : toutes les APIs sont en mode blocage ──────────
# Les exceptions ci-dessous sont le résultat du fine-tuning progressif.
# Chaque exclusion est documentée avec le numéro de règle CRS et la raison.
#
# Fine-tuning réalisé le 2026-03-23 :
#   - 230/262 tests passaient en mode blocking sans exclusion
#   - 32 échecs causés par 2 règles CRS identifiées via les logs Coraza
#   - Exclusions ciblées ajoutées ci-dessous

# Règle 920540 — "Possible Unicode character bypass detected"
# Faux positif : les payloads JSON-RPC contiennent des accents français
# encodés en Unicode (\u00e9, \u00e8, \u2014) dans les descriptions de
# vaults, policies et secrets. C'est le comportement normal de JSON.
# Scope : /mcp (JSON-RPC) et /admin/api (REST JSON)
SecRule REQUEST_URI "@beginsWith /mcp" \
    "id:10001,phase:1,pass,nolog,\
     ctl:ruleRemoveById=920540"

SecRule REQUEST_URI "@beginsWith /admin/api" \
    "id:10002,phase:1,pass,nolog,\
     ctl:ruleRemoveById=920540"

# Règle 932120 — "Remote Command Execution: Windows PowerShell Command Found"
# Faux positif : les noms de policies comme "test-path-restrict" contiennent
# "test-path" qui matche le cmdlet PowerShell Test-Path. Les noms d'outils MCP
# comme "secret_write", "vault_delete" peuvent aussi déclencher cette règle.
# Scope : /mcp (JSON-RPC) et /admin/api (REST JSON)
SecRule REQUEST_URI "@beginsWith /mcp" \
    "id:10003,phase:1,pass,nolog,\
     ctl:ruleRemoveById=932120"

SecRule REQUEST_URI "@beginsWith /admin/api" \
    "id:10004,phase:1,pass,nolog,\
     ctl:ruleRemoveById=932120"

# ── Endpoints publics PKI/ACME (v0.5.0) ──────────────────────────
#
# Distribution CA/CRL (unauthenticated par design PKI) :
#   /pki/ca/root.pem, /pki/ca/chain.pem, /pki/ca/crl.pem
# Protocole ACME RFC 8555 (auth via JWS, pas Bearer) :
#   endpoints ACME normalisés (directory, new-nonce, new-account, new-order, etc.)
#
# Règles strictes par regex — exclut /pki/ et /acme/ génériques
# pour éviter de désactiver CRS sur des paths arbitraires.
#
# /pki/ca/ : seulement les 3 fichiers PEM/CRL connus
SecRule REQUEST_URI "@rx ^/pki/ca/(root|chain|crl)\.pem$" \
    "id:10005,phase:1,pass,nolog,\
     ctl:ruleRemoveById=920540,\
     ctl:ruleRemoveById=932120"

# /acme/ : protocole ACME normalisé (directory, nonces, accounts, orders, challenges, certs)
SecRule REQUEST_URI "@rx ^/acme/(directory|new-nonce|new-account|new-order|revoke-cert|key-change|[a-zA-Z0-9_\-]{1,128}(/finalize|/cert)?)$" \
    "id:10006,phase:1,pass,nolog,\
     ctl:ruleRemoveById=920540,\
     ctl:ruleRemoveById=932120"

# /v1/_sys_pki_int/acme/ : path long généré par OpenBao dans les réponses ACME
SecRule REQUEST_URI "@rx ^/v1/_sys_pki_int/acme/(directory|new-nonce|new-account|new-order|revoke-cert|key-change|[a-zA-Z0-9_\-]{1,128}(/finalize|/cert)?)$" \
    "id:10007,phase:1,pass,nolog,\
     ctl:ruleRemoveById=920540,\
     ctl:ruleRemoveById=932120"
